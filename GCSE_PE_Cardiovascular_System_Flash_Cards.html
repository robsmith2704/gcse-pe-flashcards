<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cardiovascular System — GCSE PE Flash Cards</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #1d4ed8;
    --accent-dim: #1d4ed833;
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222636;
    --border: #2e3347;
    --text: #e8eaf0;
    --text-dim: #7b82a0;
    --radius: 16px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 720px;
    margin-bottom: 32px;
  }
  .spec-badge {
    display: inline-block;
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(22px, 5vw, 32px);
    line-height: 1.2;
    color: var(--text);
  }
  .subtitle {
    margin-top: 6px;
    font-size: 13px;
    color: var(--text-dim);
  }

  /* ── Progress ── */
  .progress-bar {
    width: 100%;
    max-width: 720px;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width .3s ease;
  }
  .progress-label {
    width: 100%;
    max-width: 720px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 28px;
  }
  .known-count { color: var(--accent); font-weight: 600; }

  /* ── Card ── */
  .card-wrap {
    width: 100%;
    max-width: 720px;
    perspective: 1200px;
    cursor: pointer;
    margin-bottom: 24px;
  }
  .card-inner {
    position: relative;
    width: 100%;
    min-height: 280px;
    transform-style: preserve-3d;
    transition: transform .5s cubic-bezier(.4,0,.2,1);
    border-radius: var(--radius);
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius);
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border: 1px solid var(--border);
  }
  .card-front {
    background: var(--surface);
    border-top: 3px solid var(--accent);
  }
  .card-back {
    background: var(--surface2);
    transform: rotateY(180deg);
    border-top: 3px solid var(--accent);
  }
  .card-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .card-q {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(18px, 3.5vw, 26px);
    line-height: 1.35;
    color: var(--text);
  }
  .card-hint {
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-hint svg { opacity: .5; }
  .card-a {
    font-size: clamp(14px, 2.5vw, 17px);
    line-height: 1.65;
    color: var(--text);
  }
  .card-a strong { color: var(--accent); }
  .card-example {
    margin-top: 16px;
    padding: 12px 16px;
    background: var(--accent-dim);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
  }
  .card-example span { color: var(--text); font-style: normal; }

  /* ── Controls ── */
  .controls {
    width: 100%;
    max-width: 720px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn {
    flex: 1;
    min-width: 120px;
    padding: 14px 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-prev { background: var(--surface); color: var(--text-dim); }
  .btn-prev:hover { border-color: var(--accent); color: var(--text); }
  .btn-known {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn-known:hover { opacity: .85; }
  .btn-known.marked { background: transparent; color: var(--accent); }
  .btn-next { background: var(--surface); color: var(--text-dim); }
  .btn-next:hover { border-color: var(--accent); color: var(--text); }

  /* ── Shuffle + Reset ── */
  .secondary-controls {
    width: 100%;
    max-width: 720px;
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .btn-sm {
    padding: 9px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-sm:hover { color: var(--text); border-color: var(--accent-dim); }

  /* ── Completion ── */
  .complete {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 48px 24px;
    width: 100%;
    max-width: 720px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    border-top: 3px solid var(--accent);
  }
  .complete.show { display: flex; }
  .complete-emoji { font-size: 48px; margin-bottom: 16px; }
  .complete h2 { font-family: 'DM Serif Display', serif; font-size: 28px; margin-bottom: 8px; }
  .complete p { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }
  .btn-restart {
    padding: 14px 32px;
    border-radius: 12px;
    background: var(--accent);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn-restart:hover { opacity: .85; }

  /* ── Footer ── */
  footer {
    margin-top: 40px;
    font-size: 11px;
    color: var(--text-dim);
    opacity: .5;
    text-align: center;
  }
  @media (max-width: 480px) {
    .card-face { padding: 28px 24px; }
    .btn { padding: 12px 14px; font-size: 13px; }
  }
</style>
</head>
<body>
<header>
  <div class="spec-badge">Edexcel 1PE0 · Component 1 · Paper 1</div>
  <h1>The Cardiovascular System</h1>
  <p class="subtitle">Tap a card to reveal · Mark cards you know to track progress</p>
</header>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="progress-label">
  <span id="cardCounter">Card 1 of 9</span>
  <span><span class="known-count" id="knownCount">0</span> known</span>
</div>

<div class="card-wrap" id="cardWrap" onclick="flipCard()">
  <div class="card-inner" id="cardInner">
    <div class="card-face card-front" id="cardFront">
      <div class="card-tag" id="frontTag">TERM</div>
      <div class="card-q" id="cardQ"></div>
      <div class="card-hint">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 15l5 5 5-5M7 9l5-5 5 5"/></svg>
        Tap to reveal
      </div>
    </div>
    <div class="card-face card-back" id="cardBack">
      <div class="card-tag" id="backTag">ANSWER</div>
      <div class="card-a" id="cardA"></div>
      <div class="card-example" id="cardExample" style="display:none">
        <span id="cardExampleText"></span>
      </div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-prev" onclick="prev()">← Prev</button>
  <button class="btn btn-known" id="knownBtn" onclick="toggleKnown()">✓ Got it</button>
  <button class="btn btn-next" onclick="next()">Next →</button>
</div>
<div class="secondary-controls">
  <button class="btn-sm" onclick="shuffle()">⇄ Shuffle</button>
  <button class="btn-sm" onclick="resetAll()">↺ Reset progress</button>
  <button class="btn-sm" onclick="filterUnknown()">👁 Unknowns only</button>
</div>

<div class="complete" id="complete">
  <div class="complete-emoji">🎉</div>
  <h2>All cards done!</h2>
  <p id="completeMsg"></p>
  <button class="btn-restart" onclick="resetAll()">Start again</button>
</div>

<footer>GCSE PE · The Cardiovascular System · robsmith2704</footer>

<script>
const ALL_CARDS = [{"id":"cv1","frontTag":"FUNCTION","backTag":"EXPLANATION + EXAMPLE","q":"State the five functions of the cardiovascular system.","a":"1. Transport O₂ to muscles<br>2. Remove CO₂<br>3. Transport nutrients (glucose)<br>4. Clot open wounds (platelets)<br>5. Regulate body temperature (vasodilation near skin)","example":"e.g. During a race, blood delivers O₂ to working leg muscles and removes CO₂."},{"id":"cv2","frontTag":"HEART STRUCTURE","backTag":"FUNCTION","q":"What does the left ventricle do and why are its walls the thickest?","a":"The left ventricle pumps <strong>oxygenated blood to the whole body</strong> via the aorta. Its walls are thickest because it must generate the greatest pressure to push blood the furthest distance.","example":"e.g. Blood travels from the heart to the feet during exercise."},{"id":"cv3","frontTag":"HEART STRUCTURE","backTag":"FUNCTION","q":"What is the role of the right ventricle?","a":"Pumps <strong>deoxygenated blood to the lungs</strong> via the pulmonary artery to pick up oxygen.","example":"e.g. Deoxygenated blood from working muscles returns here before going to the lungs."},{"id":"cv4","frontTag":"HEART STRUCTURE","backTag":"FUNCTION","q":"What is the role of the valves in the heart?","a":"Valves prevent <strong>backflow of blood</strong> — they ensure blood moves in one direction only.<br>• Tricuspid/bicuspid = between atria and ventricles<br>• Semi-lunar = at exit of ventricles","example":"e.g. Without valves, blood would flow back into the atria during ventricular contraction."},{"id":"cv5","frontTag":"BLOOD VESSELS","backTag":"STRUCTURE + FUNCTION","q":"Compare the structure and function of arteries, capillaries and veins.","a":"<strong>Arteries</strong>: thick walls, small lumen — carry blood away from heart at high pressure.<br><strong>Capillaries</strong>: one cell thick — site of gas/nutrient exchange.<br><strong>Veins</strong>: thin walls, large lumen, valves — return blood to heart at low pressure.","example":"e.g. Capillaries in muscle tissue allow O₂ to diffuse into muscle cells."},{"id":"cv6","frontTag":"KEY TERM","backTag":"DEFINITION + EXAMPLE","q":"What is vascular shunting?","a":"The <strong>redistribution of blood</strong> from inactive organs to working muscles during exercise. Achieved via vasodilation (active muscles) and vasoconstriction (inactive organs like the gut).","example":"e.g. During a sprint, up to 80% of cardiac output is directed to the leg muscles."},{"id":"cv7","frontTag":"BLOOD COMPONENTS","backTag":"FUNCTION","q":"What are the four components of blood and their functions?","a":"<strong>Red blood cells</strong> — carry O₂ (via haemoglobin).<br><strong>White blood cells</strong> — immune defence.<br><strong>Platelets</strong> — clot wounds.<br><strong>Plasma</strong> — carries nutrients, hormones, CO₂, heat.","example":"e.g. Long-term training increases red blood cell count, improving O₂ delivery."},{"id":"cv8","frontTag":"EXAM QUESTION","backTag":"ANSWER","q":"Explain why the pulmonary artery is unusual compared to other arteries.","a":"It is the <strong>only artery that carries deoxygenated blood</strong>. All other arteries carry oxygenated blood. It travels from the right ventricle to the lungs.","example":"This is a classic trick question — arteries carry blood AWAY from the heart, not necessarily oxygenated blood."},{"id":"cv9","frontTag":"PATHWAY","backTag":"STEP-BY-STEP","q":"Trace the pathway of blood through the heart.","a":"Vena cava → <strong>right atrium</strong> → tricuspid valve → <strong>right ventricle</strong> → pulmonary artery → lungs → pulmonary vein → <strong>left atrium</strong> → bicuspid valve → <strong>left ventricle</strong> → aorta → body","example":"Tip: remember right side = deoxygenated; left side = oxygenated."}];
let cards = [...ALL_CARDS];
let idx = 0;
let flipped = false;
let known = new Set();
let unknownOnly = false;

function render() {
  if (idx >= cards.length) { showComplete(); return; }
  const c = cards[idx];
  document.getElementById('cardQ').innerHTML = c.q;
  document.getElementById('cardA').innerHTML = c.a;
  document.getElementById('frontTag').textContent = c.frontTag || 'TERM';
  document.getElementById('backTag').textContent = c.backTag || 'ANSWER';
  const ex = document.getElementById('cardExample');
  const exTxt = document.getElementById('cardExampleText');
  if (c.example) { exTxt.innerHTML = c.example; ex.style.display = 'block'; }
  else { ex.style.display = 'none'; }
  // Reset flip
  const inner = document.getElementById('cardInner');
  inner.classList.remove('flipped');
  flipped = false;
  // Known button
  const btn = document.getElementById('knownBtn');
  btn.textContent = known.has(cards[idx].id) ? '✓ Known!' : '✓ Got it';
  btn.classList.toggle('marked', known.has(cards[idx].id));
  // Progress
  document.getElementById('cardCounter').textContent = `Card ${idx+1} of ${cards.length}`;
  document.getElementById('knownCount').textContent = known.size;
  document.getElementById('progressFill').style.width = `${(known.size / ALL_CARDS.length) * 100}%`;
  document.getElementById('complete').classList.remove('show');
  document.getElementById('cardWrap').style.display = '';
  document.querySelector('.controls').style.display = '';
  document.querySelector('.secondary-controls').style.display = '';
}

function flipCard() {
  document.getElementById('cardInner').classList.toggle('flipped');
  flipped = !flipped;
}
function next() { idx = (idx + 1) % cards.length; render(); }
function prev() { idx = (idx - 1 + cards.length) % cards.length; render(); }
function toggleKnown() {
  const c = cards[idx];
  if (known.has(c.id)) known.delete(c.id); else known.add(c.id);
  render();
}
function shuffle() {
  cards = cards.sort(() => Math.random() - .5);
  idx = 0; render();
}
function filterUnknown() {
  unknownOnly = !unknownOnly;
  cards = unknownOnly ? ALL_CARDS.filter(c => !known.has(c.id)) : [...ALL_CARDS];
  if (cards.length === 0) { alert('No unknown cards — all marked as known!'); cards = [...ALL_CARDS]; unknownOnly = false; }
  idx = 0; render();
}
function resetAll() {
  known = new Set(); cards = [...ALL_CARDS]; idx = 0; unknownOnly = false; render();
}
function showComplete() {
  document.getElementById('cardWrap').style.display = 'none';
  document.querySelector('.controls').style.display = 'none';
  document.querySelector('.secondary-controls').style.display = 'none';
  const known_count = known.size;
  document.getElementById('completeMsg').textContent =
    `You marked ${known_count} of ${ALL_CARDS.length} cards as known. ${known_count === ALL_CARDS.length ? 'Perfect score!' : 'Keep going — you\'re getting there!'}`;
  document.getElementById('complete').classList.add('show');
}
// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'l') next();
  else if (e.key === 'ArrowLeft' || e.key === 'h') prev();
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  else if (e.key === 'k') toggleKnown();
});
render();
</script>
</body>
</html>
